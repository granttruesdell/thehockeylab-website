[build]
  publish = "."

[[redirects]]
  from = "/early-bird"
  to = "/waitlist.html"
  status = 301

[[redirects]]
  from = "/early-bird.html"
  to = "/waitlist.html"
  status = 301

[[redirects]]
  from = "/early-bird-confirmation.html"
  to = "/waitlist.html"
  status = 301

[[redirects]]
  from = "/waitlist"
  to = "/waitlist.html"
  status = 200

[[redirects]]
  from = "/programs"
  to = "/programs.html"
  status = 200

[[redirects]]
  from = "/method"
  to = "/method.html"
  status = 200

[[redirects]]
  from = "/mental-edge"
  to = "/mental-edge.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
